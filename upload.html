<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload File</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 18px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        h2 { text-align: center; color: #2563eb; }
        .btn {
            width: 100%;
            margin-top: 15px;
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
        }
        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #2563eb;
        }
        .flash {
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 10px;
            background: #dcfce7;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Secure File Upload</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" enctype="multipart/form-data">
            {{ form.hidden_tag() }}
            <p>{{ form.file.label }} {{ form.file() }}</p>
            <button type="submit" class="btn">Upload</button>
        </form>

        <a href="{{ url_for('home') }}">Back to Dashboard</a>
    </div>
</body>
</html>
