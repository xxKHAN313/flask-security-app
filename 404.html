<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .box {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 60px;
            color: #2563eb;
            margin-bottom: 10px;
        }
        p {
            color: #475569;
            margin-bottom: 20px;
        }
        a {
            text-decoration: none;
            background: #2563eb;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>404</h1>
        <p>Page not found</p>
        <a href="{{ url_for('home') }}">Go Home</a>
    </div>
</body>
</html>
