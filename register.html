<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #334155);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-box {
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.18);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #0f172a;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
        }

        .btn {
            width: 100%;
            background: #0f172a;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
        }

        .btn:hover {
            background: #1e293b;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        .link a {
            color: #0f172a;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="register-box">
        <h2>Create Account</h2>
        <form method="POST">
            {{ form.hidden_tag() }}

            <div class="form-group">
                <label>Username</label>
                {{ form.username() }}
            </div>

            <div class="form-group">
                <label>Password</label>
                {{ form.password() }}
            </div>

            <button type="submit" class="btn">Register</button>
        </form>

        <div class="link">
            <a href="{{ url_for('login') }}">Already have an account?</a>
        </div>
    </div>
</body>
</html>
